<html>
<head>

    var LINK = "https://script.google.com/a/macros/mercadolibre.com.co/s/AKfycbyaESrJ-tiZSftTZ60jEK50yBRXR4Fe2R7zQ8u_NG6EvDlrLJ14oT89CdQcbnkvFHmI/exec";

  <title>Dashboard Unificado MeLi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1A1A2E, #2D3277, #1A1A2E);
      background-size: 400% 400%;
      animation: gradShift 8s ease infinite;
      color: white;
      text-align: center;
    }
    @keyframes gradShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #FFE600, #FFD700, #FFC107);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      color: #2D3277;
      box-shadow: 0 0 40px rgba(255, 230, 0, .4), 0 16px 48px rgba(0,0,0,.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    h1 span {
      background: linear-gradient(135deg, #FFE600, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1rem;
      opacity: 0.7;
      font-weight: 600;
    }
    .progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #FFE600, #FFD700);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
    .dots {
      display: flex;
      gap: 8px;
    }
    .dots span {
      width: 10px;
      height: 10px;
      background: #FFE600;
      border-radius: 50%;
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(.6); opacity: .5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .credit {
      font-size: .7rem;
      opacity: .4;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>Dashboard <span>Unificado</span></h1>
    <p>Redirigiendo al dashboard...</p>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="dots"><span></span><span></span><span></span></div>
    <div class="credit">Hecho con 💛 por Juan Sebastian Guerrero Rodriguez</div>
  </div>
</body>
</html>
